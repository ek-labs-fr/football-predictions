name: pr-gate

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  AWS_DEFAULT_REGION: eu-west-3
  CDK_DEFAULT_ACCOUNT: "675266034459"
  CDK_DEFAULT_REGION: eu-west-3

jobs:
  python:
    name: Python (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting with ruff
        run: uv run ruff format --check .

      - name: Run pytest
        run: uv run pytest --no-cov -q

  cdk-synth:
    name: CDK synth (all stacks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: |
          uv sync --frozen
          uv pip install -r infrastructure/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK
        run: npm install -g aws-cdk@2

      - name: Synth all stacks
        working-directory: infrastructure
        run: uv run cdk synth --quiet

  ui-build:
    # NOTE: Angular ESLint isn't configured (no .eslintrc, no `lint` script in
    # package.json), so this job currently only builds. To enable linting,
    # run `ng add @angular-eslint/schematics` in src/ui/client and add an
    # `npx ng lint` step here.
    name: UI (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/ui/client/package-lock.json

      - name: Install
        working-directory: src/ui/client
        run: npm ci

      - name: Build production bundle
        working-directory: src/ui/client
        run: npx ng build --configuration production
